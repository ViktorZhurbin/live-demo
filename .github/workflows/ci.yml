name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm must be installed before setup-node so its cache can resolve the store.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build before typecheck: static/LiveDemo.tsx imports the package's own
      # public API by its published specifier, which resolves through the
      # exports map to dist — building first keeps that check honest instead
      # of aliasing it back to src.
      - name: Build
        run: pnpm build:lib

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Knip
        run: pnpm knip

      - name: Build website
        run: pnpm --filter website build

      # Playwright's own CI docs advise against caching browser binaries:
      # restoring the cache costs about as much as re-downloading, and the
      # OS-level deps `--with-deps` also installs aren't cacheable anyway.
      - name: Install Playwright browsers
        run: pnpm --filter website exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm --filter website test:e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-traces
          path: website/test-results/
          retention-days: 30
